<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GLEE HUB — DSY2 Quality</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1c1c1c;--dark2:#252525;--dark3:#2e2e2e;
  --cream:#ece9e3;--cream2:#f5f3ef;--white:#ffffff;
  --border:#d8d4cc;--border-dark:rgba(255,255,255,0.08);
  --amber:#c97f00;--green:#2a7a45;--red:#c0392b;--blue:#1a56a0;
  --text:#1c1c1c;--text2:#6b6b6b;--text3:#a0a0a0;
  --sidebar-w:210px;--topbar-h:52px;
  --font:'Barlow',system-ui,sans-serif;
  --cond:'Barlow Condensed',system-ui,sans-serif;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px}

/* ─ TOP BAR ─────────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:300;
  background:var(--dark);border-bottom:1px solid var(--border-dark);
  display:flex;align-items:center;padding:0 20px 0 0;
}
.topbar-brand{
  width:var(--sidebar-w);flex-shrink:0;padding:0 20px;
  font-family:var(--cond);font-size:18px;font-weight:900;letter-spacing:-.01em;
  color:#fff;display:flex;align-items:center;gap:0;
}
.topbar-brand span{color:rgba(255,255,255,.4);font-weight:600}
.topbar-center{display:flex;align-items:center;gap:16px;flex:1;padding-left:8px}
.topbar-date{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.01em}
.topbar-clock{font-family:var(--cond);font-size:22px;font-weight:800;color:#fff;letter-spacing:.02em}
.topbar-right{display:flex;align-items:center;gap:16px;margin-left:auto}
.topbar-role{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase}
.topbar-station{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.04em}
.live-dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--dark3);border:1px solid var(--border-dark);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:.02em}
.topbar-user{display:flex;flex-direction:column;align-items:flex-end}
.topbar-user-name{font-size:12px;font-weight:600;color:#fff;line-height:1.2}
.topbar-user-email{font-size:10px;color:rgba(255,255,255,.35)}

/* ─ LAYOUT ──────────────────────────────── */
.layout{display:flex;height:100%;padding-top:var(--topbar-h)}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--dark);
  border-right:1px solid var(--border-dark);
  display:flex;flex-direction:column;overflow-y:auto;
  position:fixed;top:var(--topbar-h);bottom:0;left:0;z-index:200;
}
.main{margin-left:var(--sidebar-w);flex:1;background:var(--cream);overflow-y:auto;height:calc(100vh - var(--topbar-h))}

/* ─ SIDEBAR NAV ─────────────────────────── */
.nav-section{margin-bottom:4px}
.nav-group{
  padding:18px 20px 6px;font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);
  cursor:default;display:flex;align-items:center;gap:6px
}
.nav-group.clickable{cursor:pointer}.nav-group.clickable:hover{color:rgba(255,255,255,.6)}
.nav-group.active-group{color:#fff}
.nav-item{
  padding:9px 20px;font-size:11px;font-weight:500;letter-spacing:.04em;
  text-transform:uppercase;color:rgba(255,255,255,.4);cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:8px;
}
.nav-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.03)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active::before{content:'→';color:#fff;font-size:10px}
.nav-item:not(.active)::before{content:'→';color:transparent;font-size:10px}
.nav-divider{height:1px;background:var(--border-dark);margin:8px 20px}
.sidebar-bottom{margin-top:auto;padding:16px 0;border-top:1px solid var(--border-dark)}
.nav-status{padding:12px 20px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.04em}
.nav-status strong{color:rgba(255,255,255,.5);display:block;margin-bottom:2px}

/* ─ TOP CONTENT BAR ─────────────────────── */
.content-topbar{
  background:var(--cream2);border-bottom:1px solid var(--border);
  padding:10px 28px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-right:4px}

/* ─ WEEK SELECTOR ───────────────────────── */
.wsel-wrap{position:relative}
.wsel-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--white);border:1px solid var(--border);border-radius:4px;
  color:var(--text);padding:6px 14px;cursor:pointer;font-size:11px;font-weight:600;
  font-family:var(--font);transition:all .15s;letter-spacing:.02em;white-space:nowrap;
}
.wsel-btn:hover,.wsel-btn.open{border-color:var(--dark);background:var(--dark);color:#fff}
.wdot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.wpanel{
  position:absolute;top:calc(100%+6px);left:0;z-index:500;
  background:var(--white);border:1px solid var(--border);border-radius:6px;
  padding:14px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.12);display:none;
}
.wpanel.open{display:block}
.wph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.wph-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.wph-acts{display:flex;gap:5px}
.wph-btn{background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text2);padding:3px 8px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font)}
.wph-btn:hover{border-color:var(--dark);color:var(--dark)}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.wck{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 8px;border-radius:4px;border:1px solid var(--border);transition:all .12s}
.wck:hover{border-color:#999}
.wck.on{background:var(--dark);border-color:var(--dark)}
.wckb{width:14px;height:14px;border-radius:2px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.wck.on .wckb{background:#fff;border-color:#fff}
.wck-l{font-size:11px;font-weight:600;color:var(--text)}
.wck.on .wck-l{color:#fff}
.wbar-r{margin-left:auto;font-size:11px;color:var(--text2)}
.wbar-r strong{color:var(--text);font-weight:700}

/* ─ CONTENT ─────────────────────────────── */
.content{padding:28px}
.page-head{margin-bottom:24px}
.page-head-sub{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.page-title{font-family:var(--cond);font-size:36px;font-weight:900;letter-spacing:-.02em;line-height:1;color:var(--dark)}
.page-title span{font-weight:300;color:var(--text2)}
.section-head{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* ─ CARD SYSTEM ─────────────────────────── */
.card-grid{display:grid;gap:1px;background:var(--border);margin-bottom:1px}
.cg2{grid-template-columns:1fr 1fr}
.cg3{grid-template-columns:1fr 1fr 1fr}
.cg4{grid-template-columns:1fr 1fr 1fr 1fr}
.card{background:var(--cream2);padding:20px 22px}
.card.dark{background:var(--dark);color:#fff}
.card.white{background:var(--white)}
.card.span2{grid-column:span 2}
.card.span3{grid-column:span 3}
.c-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:10px}
.card.dark .c-label{color:rgba(255,255,255,.4)}
.c-val{font-family:var(--cond);font-size:48px;font-weight:600;letter-spacing:-.03em;line-height:1;color:var(--dark)}
.card.dark .c-val{color:#fff}
.c-val.lg{font-size:64px}
.c-val.sm{font-size:32px}
.c-val.good{color:var(--green)}.c-val.warn{color:var(--amber)}.c-val.bad{color:var(--red)}
.card.dark .c-val.good{color:#4ade80}.card.dark .c-val.warn{color:#fbbf24}.card.dark .c-val.bad{color:#f87171}
.c-sub{font-size:11px;color:var(--text2);margin-top:6px}
.card.dark .c-sub{color:rgba(255,255,255,.4)}
.c-change{font-size:11px;font-weight:600;margin-top:4px}

/* ─ TABLE SYSTEM ─────────────────────────── */
.tbl-section{background:var(--white);border:1px solid var(--border);margin-bottom:16px}
.tbl-section-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-wrap{overflow:auto}
.tbl-wrap.h400{max-height:400px}.tbl-wrap.h500{max-height:500px}.tbl-wrap.h580{max-height:580px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:5}
th{background:var(--cream2);border-bottom:1px solid var(--border);color:var(--text2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:9px 14px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--dark)}
.sa::after{content:' ↑';color:var(--dark)}.sd::after{content:' ↓';color:var(--dark)}
td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.tn{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;font-family:var(--cond);font-size:13px;font-weight:600}
.tg{color:var(--green)}.tw{color:var(--amber)}.tr{color:var(--red)}
.na{color:var(--text3)}

/* ─ TIER BADGE ───────────────────────────── */
.tier{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border-radius:2px}
.tfp{background:#d1fae5;color:#065f46}.tf{background:#dbeafe;color:#1e40af}
.tgr{background:#fef3c7;color:#92400e}.tfa{background:#fee2e2;color:#991b1b}

/* ─ CHART ────────────────────────────────── */
.chart-card{background:var(--white);border:1px solid var(--border);padding:20px 22px;margin-bottom:16px}
.cw{position:relative;width:100%}
.h160{height:160px}.h180{height:180px}.h200{height:200px}.h220{height:220px}.h240{height:240px}

/* ─ INPUTS / BUTTONS ────────────────────── */
input,select,textarea{background:var(--white);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:7px 11px;font-size:12px;font-family:var(--font);transition:border-color .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--dark)}
select option{background:#fff}
.srw{position:relative}.srw input{padding-left:30px;width:100%}
.sri{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.btn{padding:8px 18px;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);letter-spacing:.04em;text-transform:uppercase;transition:all .12s}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:var(--dark2)}
.btn-light{background:var(--cream2);color:var(--dark);border:1px solid var(--border)}.btn-light:hover{background:var(--border)}
.btn-red{background:#fee2e2;color:var(--red);border:1px solid #fecaca}
.btn-sm{padding:5px 12px;font-size:11px}
.filt{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.rmt{display:flex;gap:0;background:var(--cream2);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.rmb{padding:6px 14px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:.04em;text-transform:uppercase;transition:all .12s}
.rmb.on{background:var(--dark);color:#fff}
.daswrap{position:relative;min-width:180px}
.dasdrop{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--white);border:1px solid var(--border);max-height:240px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.1);display:none;margin-top:2px}
.dasdrop.open{display:block}
.daopt{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px}
.daopt:hover{background:var(--cream)}.daopt.sel{color:var(--dark);font-weight:600}
.daoch{width:14px;height:14px;border-radius:2px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.daopt.sel .daoch{background:var(--dark);border-color:var(--dark)}
.rpill{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;font-weight:600;background:var(--cream);color:var(--text2);text-transform:uppercase;letter-spacing:.03em}
.pkgid{font-family:'Courier New',monospace;font-size:11px;color:var(--blue)}
.pag{display:flex;align-items:center;gap:8px;padding:12px 14px;border-top:1px solid var(--border);background:var(--cream2);font-size:12px;color:var(--text2)}
.pgb{padding:4px 10px;border:1px solid var(--border);background:var(--white);color:var(--text);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font)}
.pgb:hover{background:var(--dark);color:#fff;border-color:var(--dark)}.pgb:disabled{opacity:.35;cursor:default}
.fg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:5px}
.fwrap{display:flex;flex-direction:column}
.note{font-size:11px;color:var(--text2);background:var(--cream2);border:1px solid var(--border);padding:10px 14px;margin-bottom:14px;border-left:3px solid var(--amber)}
.sec{display:none}.sec.on{display:block}

/* ─ TOAST ────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:10px 18px;font-size:12px;font-weight:700;z-index:999;letter-spacing:.02em;box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* ─ DRIVE STATUS ─────────────────────────── */
.drive-status{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.drive-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ds-ok{color:var(--green)}.ds-ok .drive-dot{background:var(--green)}
.ds-off{color:var(--text2)}.ds-off .drive-dot{background:var(--text2)}
.ds-err{color:var(--red)}.ds-err .drive-dot{background:var(--red)}
</style>
</head>

// ══════════════════════════════════════════
//  GOOGLE DRIVE CONFIG — paste your URL here
// ══════════════════════════════════════════
let DRIVE_URL = localStorage.getItem('glel_drive_url') || '';

// ══════════════════════════════════════════
//  EMBEDDED SEED DATA

/* ─ CLOCK ─ */
function tickClock(){
  const now=new Date();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('t-date').textContent=days[now.getDay()]+'. '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('t-clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
}
setInterval(tickClock,1000);tickClock();

/* ─ GOOGLE DRIVE ─ */
let driveStatus='off'; // 'off' | 'ok' | 'err'
function updDriveUI(){
  const ind=document.getElementById('drive-indicator');
  const top=document.getElementById('drive-status-top');
  const cfg=DRIVE_URL?true:false;
  if(!cfg){
    if(ind)ind.innerHTML='<div class="drive-status ds-off"><div class="drive-dot"></div>Local storage only</div>';
    if(top)top.textContent='Local storage only';
  } else if(driveStatus==='ok'){
    if(ind)ind.innerHTML='<div class="drive-status ds-ok"><div class="drive-dot"></div>Google Drive connected</div>';
    if(top)top.textContent='Drive connected ✓';
  } else {
    if(ind)ind.innerHTML='<div class="drive-status ds-err"><div class="drive-dot"></div>Drive error — using local</div>';
    if(top)top.textContent='Drive error';
  }
}
async function loadFromDrive(){
  if(!DRIVE_URL)return null;
  try{
    const r=await fetch(DRIVE_URL+'?t='+Date.now());
    if(r.ok){const d=await r.json();driveStatus='ok';updDriveUI();return d;}
  }catch(e){driveStatus='err';}
  updDriveUI();return null;
}
async function saveToDrive(data){
  if(!DRIVE_URL)return;
  try{
    await fetch(DRIVE_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    driveStatus='ok';
  }catch(e){driveStatus='err';}
  updDriveUI();
}

/* ─ STORAGE ─ */
async function init(){
  let data=await loadFromDrive();
  if(!data){try{const s=localStorage.getItem('glel_v5');if(s)data=JSON.parse(s);}catch(e){}}
  if(!data)data={ws:{...SEED_WS},wb:{...SEED_WB},das:[...SEED_DA],updated:null};
  DB=data;
  localStorage.setItem('glel_v5',JSON.stringify(DB));
  SW=Object.keys(DB.ws).sort((a,b)=>+a-+b);
  updMeta();updDriveUI();renderWGrid();render();
}
async function saveDB(){
  DB.updated=new Date().toISOString();
  localStorage.setItem('glel_v5',JSON.stringify(DB));
  saveToDrive(DB);
  updMeta();toast('Saved');
}
function updMeta(){
  const n=Object.keys(DB.ws).length;
  document.getElementById('db-status').innerHTML=`<strong>DATABASE</strong>${n} weeks · ${DB.das.length} drivers${DB.updated?'<br>'+new Date(DB.updated).toLocaleDateString('en-GB'):''}`;
}

/* ─ WEEK SELECTOR ─ */
function renderWGrid(){
  const wks=Object.keys(DB.ws).sort((a,b)=>+a-+b);
  document.getElementById('wgrid').innerHTML=wks.map(w=>`
    <label class="wck${SW.includes(w)?' on':''}" onclick="twk('${w}')">
      <div class="wckb">${SW.includes(w)?'<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2.5L7 1" stroke="#1c1c1c" stroke-width="1.6" stroke-linecap="round"/></svg>':''}</div>
      <span class="wck-l">W${w}</span>
    </label>`).join('');
  const n=SW.length,tot=wks.length;
  document.getElementById('wsel-lbl').textContent=n===0?'No weeks':n===tot?'All '+tot+' weeks':n+' / '+tot+' weeks';
  document.getElementById('swcnt').textContent=n;
}
function twk(w){SW=SW.includes(w)?SW.filter(x=>x!==w):[...SW,w].sort((a,b)=>+a-+b);renderWGrid();render();}
function swAll(){SW=Object.keys(DB.ws).sort((a,b)=>+a-+b);renderWGrid();render();}
function swNone(){SW=[];renderWGrid();render();}
function swRecent(n){SW=Object.keys(DB.ws).sort((a,b)=>+a-+b).slice(-n);renderWGrid();render();}

/* ─ UTILS ─ */
const avg=a=>{const v=a.filter(x=>x!=null);return v.length?v.reduce((x,y)=>x+y,0)/v.length:null;};
const sum=a=>a.reduce((x,y)=>x+(y||0),0);
const f1=n=>n==null?'—':parseFloat(n).toFixed(1);
const fi=n=>n==null?'—':Math.round(n).toLocaleString();
function kpOk(v,m){if(v==null||m.t==null)return null;return m.lo?v<=m.t:v>=m.t;}
function tb(tier){return`<span class="tier ${TCLS[tier]||'tfa'}">${tier||'—'}</span>`;}
function mkC(id,type,labels,datasets,opts){
  if(CHS[id]){CHS[id].destroy();delete CHS[id];}
  const ctx=document.getElementById(id);if(!ctx)return;
  opts=opts||{};
  CHS[id]=new Chart(ctx,{type,data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,animation:{duration:200},
    plugins:{legend:{display:opts.leg||false,...(opts.legO||{})},
      tooltip:{mode:'index',intersect:false,backgroundColor:'#1c1c1c',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#fff',bodyColor:'rgba(255,255,255,.6)',padding:10}},
    scales:{
      y:{beginAtZero:opts.y0||false,grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#999',font:{size:10},...(opts.yt||{})}},
      x:{grid:{display:false},ticks:{color:'#999',font:{size:10}}}
    },layout:{padding:{top:8}},...(opts.ex||{})
  }});
}
function gSW(){return SW.filter(w=>DB.ws[w]).map(w=>DB.ws[w]);}
function gLW(){return SW.filter(w=>DB.ws[w]).slice(-1)[0];}

function toggleDADrop(e){e&&e.stopPropagation();daDrpOpen=!daDrpOpen;document.getElementById('dasdrop').classList.toggle('open',daDrpOpen);if(daDrpOpen)document.getElementById('da-srch').focus();}
function rDADrop(){
  const q=(document.getElementById('da-srch')?.value||'').toLowerCase();
  const activeTIs=new Set();SW.forEach(w=>{if(DA_SC[w])Object.keys(DA_SC[w]).forEach(ti=>activeTIs.add(ti));});
  const das=Array.from(activeTIs).map(ti=>({ti,n:DA_NAMES[+ti]||TID_LIST[+ti]})).filter(d=>d.n.toLowerCase().includes(q)).sort((a,b)=>a.n.localeCompare(b.n));
  const opts=document.getElementById('da-opts');if(!opts)return;
  opts.innerHTML=das.map(d=>`<div class="daopt ${rkSelDAs.includes(String(d.ti))?'sel':''}" onclick="togDA('${d.ti}')"><div class="daoch">${rkSelDAs.includes(String(d.ti))?'<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2.5L7 1" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>':''}</div><span>${d.n}</span></div>`).join('');
  document.getElementById('da-btn').placeholder=rkSelDAs.length?rkSelDAs.length+' driver'+(rkSelDAs.length!==1?'s':'')+' selected':'Filter specific drivers ('+das.length+' active)';
}
function togDA(i){const s=String(i);rkSelDAs=rkSelDAs.includes(s)?rkSelDAs.filter(x=>x!==s):[...rkSelDAs,s];rkPg=0;rDADrop();rRankTbl();}
function sortRk(c){if(rkSort.c===c)rkSort.d=rkSort.d==='asc'?'desc':'asc';else{rkSort.c=c;rkSort.d='desc';}rkPg=0;rRankTbl();}
function buildRkRows(){
  const wks=SW.filter(w=>DA_SC[w]);let rows=[];
  if(rkMode==='week'){
    wks.forEach(wk=>{Object.entries(DA_SC[wk]).forEach(([ti,sc])=>{
      if(rkSelDAs.length&&!rkSelDAs.includes(ti))return;
      const name=DA_NAMES[+ti]||ti;
      if(rkSrch&&!name.toLowerCase().includes(rkSrch.toLowerCase()))return;
      rows.push({ti,name,wk,...Object.fromEntries(SC_COLS.map((c,i)=>[c.k,sc[i]]))});
    });});
  } else {
    const daMap={};
    wks.forEach(wk=>{Object.entries(DA_SC[wk]).forEach(([ti,sc])=>{
      if(rkSelDAs.length&&!rkSelDAs.includes(ti))return;
      const name=DA_NAMES[+ti]||ti;
      if(rkSrch&&!name.toLowerCase().includes(rkSrch.toLowerCase()))return;
      if(!daMap[ti])daMap[ti]={ti,name,wks:[],data:SC_COLS.map(()=>[])};
      daMap[ti].wks.push(wk);
      SC_COLS.forEach((c,i)=>{if(sc[i]!=null)daMap[ti].data[i].push(sc[i]);});
    });});
    Object.values(daMap).forEach(da=>{
      const row={ti:da.ti,name:da.name,wk:da.wks.length+' wk'+(da.wks.length!==1?'s':'')};
      SC_COLS.forEach((c,i)=>{const vals=da.data[i];row[c.k]=!vals.length?null:c.k==='d'?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):vals.reduce((a,b)=>a+b,0)/vals.length;});
      rows.push(row);
    });
  }
  const {c,d}=rkSort;const dir=d==='asc'?1:-1;
  rows.sort((a,b)=>{const av=a[c],bv=b[c];if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return-1;return typeof av==='string'?av.localeCompare(bv)*dir:(av-bv)*dir;});
  return rows;
}
function rRankTbl(){
  const wrap=document.getElementById('rk-tbl');if(!wrap)return;
  const rows=buildRkRows();const tot=rows.length;
  if(!tot){wrap.innerHTML='<div style="padding:2rem;color:#999;text-align:center">No data</div>';return;}
  const page=rows.slice(rkPg*PG,(rkPg+1)*PG);
  const th=(c,l)=>`<th class="${rkSort.c===c?'s'+rkSort.d[0]:''}" onclick="sortRk('${c}')">${l}</th>`;
  wrap.innerHTML=`<div class="tbl-wrap h580"><table><thead><tr>
    ${th('name','Driver')}${rkMode==='week'?'<th>Week</th>':'<th>Weeks</th>'}
    ${SC_COLS.map(c=>th(c.k,c.l)).join('')}
  </tr></thead><tbody>
  ${page.map(r=>`<tr>
    <td style="font-weight:600;min-width:160px">${r.name}</td>
    ${rkMode==='week'?`<td><span class="tier tgr">W${r.wk}</span></td>`:`<td style="color:var(--text2);font-size:11px">${r.wk}</td>`}
    ${SC_COLS.map(c=>{const v=r[c.k];const ok=kpOk(v,c);const clr=c.t!=null&&v!=null?(ok?'var(--green)':'var(--red)'):'var(--text)';return`<td class="tn" style="color:${clr};${c.t!=null&&v!=null?'font-weight:700':''}">${v==null?'<span class="na">—</span>':c.fmt(v)}</td>`;}).join('')}
  </tr>`).join('')}</tbody></table></div>`;
  const pg=document.getElementById('rk-pag');if(pg){const tp=Math.ceil(tot/PG);pg.innerHTML=`<span>${tot} rows · Showing ${rkPg*PG+1}–${Math.min((rkPg+1)*PG,tot)}</span><button class="pgb" onclick="rkPg--;rRankTbl()" ${rkPg===0?'disabled':''}>← Prev</button><span>Page ${rkPg+1}/${tp}</span><button class="pgb" onclick="rkPg++;rRankTbl()" ${rkPg>=tp-1?'disabled':''}>Next →</button>`;}
}

    </div>
    <select id="c-rs" onchange="cRS=this.value;cPg=0;rConcTbl()" style="min-width:180px">${rsOpts}</select>
    <div class="srw" style="min-width:180px"><svg class="sri" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="c-srch" placeholder="Tracking ID or ZIP..." value="${cSrch}" oninput="cSrch=this.value;cPg=0;rConcTbl()"></div>
    <button class="btn btn-light btn-sm" onclick="cSelDAs=[];cRS='all';cSrch='';cPg=0;rConc()">Reset</button>
    <div id="c-cnt" style="margin-left:auto;display:flex;align-items:center;gap:12px"></div>
  </div>
  <div id="c-tbl"></div>
  <div class="pag" id="c-pag"></div>
</div>`;
  setTimeout(()=>{
    mkC('c-cwk','bar',allW.map(w=>'W'+w),[{data:wkT,backgroundColor:allW.map(w=>sSet.has(+w)?'#1c1c1c':'#d4d0c8'),borderRadius:0}],{y0:true});
    mkC('c-bkt','bar',BSHORT,[{data:bT,backgroundColor:BCOLORS,borderRadius:0}],{y0:true});
    rConcDADrop();rConcTbl();
  },50);
}
let cDADrpOpen2=false;
function toggleCDADrop(e){e&&e.stopPropagation();cDADrpOpen2=!cDADrpOpen2;document.getElementById('c-dasdrop').classList.toggle('open',cDADrpOpen2);if(cDADrpOpen2){document.getElementById('c-da-srch').focus();rConcDADrop();}}
function rConcDADrop(){
  const q=(document.getElementById('c-da-srch')?.value||'').toLowerCase();
  const sSet=new Set(SW.map(Number));
  const activeTIs=new Set(CD.filter(r=>sSet.has(r[0])&&r[1]>=0).map(r=>r[1]));
  const das=Array.from(activeTIs).map(ti=>({ti,n:DA_NAMES[ti]||TID_LIST[ti]})).filter(d=>d.n.toLowerCase().includes(q)).sort((a,b)=>a.n.localeCompare(b.n));
  const opts=document.getElementById('c-da-opts');if(!opts)return;
  opts.innerHTML=das.map(d=>`<div class="daopt ${cSelDAs.includes(d.ti)?'sel':''}" onclick="togCDA(${d.ti})"><div class="daoch">${cSelDAs.includes(d.ti)?'<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2.5L7 1" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>':''}</div><span>${d.n}</span></div>`).join('');
  const btn=document.getElementById('c-da-btn');if(btn)btn.placeholder=cSelDAs.length?cSelDAs.length+' driver'+(cSelDAs.length!==1?'s':'')+' selected':'All drivers ('+das.length+' active)';
}
function togCDA(ti){cSelDAs=cSelDAs.includes(ti)?cSelDAs.filter(x=>x!==ti):[...cSelDAs,ti];cPg=0;rConcDADrop();rConcTbl();}
function sortC(c){if(cSort.c===c)cSort.d=cSort.d==='asc'?'desc':'asc';else{cSort.c=c;cSort.d='desc';}cPg=0;rConcTbl();}
function getCSRecs(){
  const sSet=new Set(SW.map(Number));
  return CD.filter(r=>{
    if(!sSet.has(r[0]))return false;
    if(cSelDAs.length&&!cSelDAs.includes(r[1]))return false;
    if(cRS!=='all'&&r[3]!==+cRS)return false;
    if(cSrch){const q=cSrch.toLowerCase();if(!r[2]?.toLowerCase().includes(q)&&!r[5]?.toLowerCase().includes(q))return false;}
    return true;
  });
}
function rConcTbl(){
  let recs=[...getCSRecs()];
  const{c,d}=cSort;const dir=d==='asc'?1:-1;
  recs.sort((a,b)=>{if(c==='cost')return(a[4]-b[4])*dir;if(c==='wk')return(a[0]-b[0])*dir;if(c==='reason')return(REASONS[a[3]]||'').localeCompare(REASONS[b[3]]||'')*dir;if(c==='da')return(DA_NAMES[a[1]]||'').localeCompare(DA_NAMES[b[1]]||'')*dir;return 0;});
  const tot=recs.length;const page=recs.slice(cPg*CPG,(cPg+1)*CPG);
  const cnt=document.getElementById('c-cnt');
  if(cnt){const tv=(recs.reduce((a,r)=>a+r[4]/100,0)).toFixed(2);cnt.innerHTML=`<span style="font-size:12px;color:var(--text2)">${tot.toLocaleString()} records</span><span style="font-family:var(--cond);font-size:22px;font-weight:900;color:var(--amber)">€${parseFloat(tv).toLocaleString('de-DE',{minimumFractionDigits:2})}</span>`;}
  const th=(c2,l)=>`<th class="${cSort.c===c2?'s'+cSort.d[0]:''}" onclick="sortC('${c2}')">${l}</th>`;
  const wrap=document.getElementById('c-tbl');if(!wrap)return;
  wrap.innerHTML=`<div class="tbl-wrap h500"><table><thead><tr>${th('wk','Wk')}${th('da','Driver')}${th('pkg','Tracking ID')}${th('reason','Reason')}${th('cost','Value')}<th>ZIP</th><th>Buckets</th><th>Date</th></tr></thead>
  <tbody>${page.map(r=>{const nm=DA_NAMES[r[1]]||r[1]||'—';const rs=REASONS[r[3]]||'—';const bkts=BSHORT.filter((_,i)=>r[6]&(1<<i)).join(', ');
    return`<tr><td><span class="tier tgr">W${r[0]}</span></td><td style="font-size:11px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${nm}">${nm}</td><td class="pkgid">${r[2]||'—'}</td><td><span class="rpill">${rs}</span></td><td class="tn" style="font-weight:700;color:var(--amber)">€${(r[4]/100).toFixed(2)}</td><td style="color:var(--text2)">${r[5]||'—'}</td><td style="font-size:10px;color:var(--text2)">${bkts||'—'}</td><td style="color:var(--text3);font-size:11px">${r[7]||'—'}</td></tr>`;}).join('')}
  </tbody></table></div>`;
  const pg=document.getElementById('c-pag');if(pg){const tp=Math.ceil(tot/CPG);pg.innerHTML=`<span>Rows ${cPg*CPG+1}–${Math.min((cPg+1)*CPG,tot)} of ${tot}</span><button class="pgb" onclick="cPg--;rConcTbl()" ${cPg===0?'disabled':''}>← Prev</button><span>${cPg+1}/${tp}</span><button class="pgb" onclick="cPg++;rConcTbl()" ${cPg>=tp-1?'disabled':''}>Next →</button>`;}
}

/* ══ MANAGE DATA ══ */
function rManage(){
  const el=document.getElementById('s-manage');
  const nw=String(Math.max(...Object.keys(DB.ws).map(Number),0)+1);
  el.innerHTML=`
<div class="page-head"><div class="page-head-sub">SETTINGS & DATA</div><h1 class="page-title"><strong>Manage</strong> <span>Data</span></h1></div>

<div class="section-head">GOOGLE DRIVE CONNECTION</div>
<div style="background:var(--white);border:1px solid var(--border);padding:20px;margin-bottom:16px">
  <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Paste your Google Apps Script URL to enable shared, persistent storage across all team members.</p>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input id="drive-url-input" value="${DRIVE_URL}" placeholder="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" style="flex:1">
    <button class="btn btn-dark btn-sm" onclick="saveDriveURL()">Connect</button>
    <button class="btn btn-light btn-sm" onclick="testDriveURL()">Test</button>
    <button class="btn btn-light btn-sm" onclick="clearDriveURL()">Disconnect</button>
  </div>
  <div id="drive-test-result" style="font-size:11px;color:var(--text2)"></div>
  <div style="margin-top:12px;font-size:11px;color:var(--text2)">Status: <span id="drive-conn-status">${DRIVE_URL?'URL set — connecting on load':'Not connected — using local storage only'}</span></div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
  <div style="background:var(--white);border:1px solid var(--border);padding:20px">
    <div class="section-head" style="margin-bottom:12px">DATABASE STATUS</div>
    <table style="font-size:12px"><tr><td style="color:var(--text2);padding:4px 0">Weeks</td><td style="font-weight:700;padding:4px 12px">${Object.keys(DB.ws).length}</td></tr>
    <tr><td style="color:var(--text2);padding:4px 0">Drivers</td><td style="font-weight:700;padding:4px 12px">${DB.das.length}</td></tr>
    <tr><td style="color:var(--text2);padding:4px 0">DA scorecard records</td><td style="font-weight:700;padding:4px 12px">${Object.values(DA_SC).reduce((a,w)=>a+Object.keys(w).length,0)}</td></tr>
    <tr><td style="color:var(--text2);padding:4px 0">Concession records</td><td style="font-weight:700;padding:4px 12px">${CD.length.toLocaleString()}</td></tr>
    <tr><td style="color:var(--text2);padding:4px 0">Last updated</td><td style="padding:4px 12px">${DB.updated?new Date(DB.updated).toLocaleString('en-GB'):'Seed data'}</td></tr></table>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-dark btn-sm" onclick="expData()">Export JSON</button>
      <button class="btn btn-red btn-sm" onclick="if(confirm('Reset to W1-W12 seed data?')){DB={ws:{...SEED_WS},wb:{...SEED_WB},das:[...SEED_DA],updated:null};saveDB();render();}">Reset to Seed</button>
    </div>
  </div>
  <div style="background:var(--white);border:1px solid var(--border);padding:20px">
    <div class="section-head" style="margin-bottom:12px">QUICK IMPORT — PASTE JSON</div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:10px">Paste the weekly scorecard JSON to add a new week instantly.</p>
    <textarea id="imp-j" rows="6" placeholder='{"week":"13","score":82.1,"tier":"Fantastic","rank":5,"dsc":1400,"dcr":99.1,"fico":820,"vsa":99,"spd":4.2,"men":100,"whc":100,"pod":99,"cc":98.5,"ce":0,"cdf":2900,"dnr":1700,"lor":0,"wb":[100,70,30,0,120,0,55,0]}'></textarea>
    <button class="btn btn-dark btn-sm" style="margin-top:8px" onclick="impJSON()">Import Week</button>
  </div>
</div>

<div class="section-head">ADD NEW WEEK — WEEK ${nw}</div>
<div style="background:var(--white);border:1px solid var(--border);padding:20px">
  <div class="fg3">
    <div class="fwrap"><div class="fl">Week #</div><input id="nw" type="number" value="${nw}"></div>
    <div class="fwrap"><div class="fl">Overall Score</div><input id="nsc" type="number" step="0.01" placeholder="82.5"></div>
    <div class="fwrap"><div class="fl">Tier</div><select id="ntr"><option>Fantastic Plus</option><option>Fantastic</option><option>Great</option><option>Fair</option><option>Poor</option></select></div>
  </div>
  <div class="fg3">
    <div class="fwrap"><div class="fl">Rank at DSY2</div><input id="nrk" type="number" placeholder="5"></div>
    <div class="fwrap"><div class="fl">DSC DPMO</div><input id="ndsc" type="number" placeholder="1450"></div>
    <div class="fwrap"><div class="fl">DCR %</div><input id="ndcr" type="number" step="0.01" placeholder="99.0"></div>
  </div>
  <div class="fg3">
    <div class="fwrap"><div class="fl">FICO</div><input id="nfi" type="number" placeholder="815"></div>
    <div class="fwrap"><div class="fl">VSA %</div><input id="nvsa" type="number" step="0.01" placeholder="99"></div>
    <div class="fwrap"><div class="fl">Speeding</div><input id="nspd" type="number" step="0.01" placeholder="4.5"></div>
  </div>
  <div class="fg3">
    <div class="fwrap"><div class="fl">Mentor %</div><input id="nmen" type="number" step="0.01" placeholder="100"></div>
    <div class="fwrap"><div class="fl">WHC %</div><input id="nwhc" type="number" step="0.01" placeholder="100"></div>
    <div class="fwrap"><div class="fl">DNR DPMO</div><input id="ndnr" type="number" placeholder="1800"></div>
  </div>
  <div class="fg3">
    <div class="fwrap"><div class="fl">POD %</div><input id="npod" type="number" step="0.01" placeholder="99"></div>
    <div class="fwrap"><div class="fl">Contact %</div><input id="ncc" type="number" step="0.01" placeholder="98.5"></div>
    <div class="fwrap"><div class="fl">CE DPMO</div><input id="nce" type="number" placeholder="0"></div>
  </div>
  <div class="fg3">
    <div class="fwrap"><div class="fl">CDF DPMO</div><input id="ncdf" type="number" placeholder="2800"></div>
    <div class="fwrap"><div class="fl">LoR DPMO</div><input id="nlor" type="number" placeholder="0"></div>
    <div class="fwrap"></div>
  </div>
  <div class="fwrap" style="margin-bottom:16px">
    <div class="fl">Concession Buckets (8 values comma-separated): Household · Neighbour · Mailslot · Receptionist · Prefs Not Followed · No POD · Geo &gt;25m · Group Stop</div>
    <input id="nwb" placeholder="100,70,30,0,120,0,55,0">
  </div>
  <button class="btn btn-dark" onclick="saveWk()">Save Week to Database</button>
</div>`;
}
function saveDriveURL(){
  DRIVE_URL=document.getElementById('drive-url-input').value.trim();
  localStorage.setItem('glel_drive_url',DRIVE_URL);
  document.getElementById('drive-conn-status').textContent=DRIVE_URL?'URL saved — will connect on next load':'Disconnected';
  toast('Drive URL saved. Reload to connect.');
}
async function testDriveURL(){
  const url=document.getElementById('drive-url-input').value.trim();
  const res=document.getElementById('drive-test-result');
  if(!url){res.textContent='Enter a URL first';return;}
  res.textContent='Testing...';
  try{const r=await fetch(url+'?t='+Date.now());if(r.ok){res.style.color='var(--green)';res.textContent='✓ Connected successfully — data received';}else{res.style.color='var(--red)';res.textContent='✗ Error: '+r.status;}}
  catch(e){res.style.color='var(--red)';res.textContent='✗ Connection failed — check CORS / URL';}
}
function clearDriveURL(){DRIVE_URL='';localStorage.removeItem('glel_drive_url');document.getElementById('drive-url-input').value='';document.getElementById('drive-conn-status').textContent='Disconnected';toast('Drive disconnected');}
function saveWk(){
  const g=id=>parseFloat(document.getElementById(id)?.value)||0;
  const gi=id=>parseInt(document.getElementById(id)?.value)||0;
  const gs=id=>document.getElementById(id)?.value||'';
  const wk=gs('nw').trim();if(!wk){toast('Week # required');return;}
  DB.ws[wk]={score:g('nsc'),tier:gs('ntr'),rank:gi('nrk'),dsc:gi('ndsc'),dcr:g('ndcr'),fico:gi('nfi'),vsa:g('nvsa'),spd:g('nspd'),men:g('nmen'),whc:g('nwhc'),pod:g('npod'),cc:g('ncc'),ce:gi('nce'),cdf:gi('ncdf'),dnr:gi('ndnr'),lor:gi('nlor')};
  const wb=gs('nwb').split(',').map(s=>parseInt(s.trim())||0);
  DB.wb[wk]=wb.length>=8?wb.slice(0,8):[...wb,...Array(8-wb.length).fill(0)];
  if(!SW.includes(wk))SW.push(wk);
  saveDB();renderWGrid();rManage();toast('Week '+wk+' saved');
}
function impJSON(){
  try{const d=JSON.parse(document.getElementById('imp-j')?.value.trim());const wk=String(d.week);if(!wk||isNaN(+wk)){toast('Invalid week');return;}
  DB.ws[wk]={score:+d.score||0,tier:d.tier||'Great',rank:+d.rank||0,dsc:+d.dsc||0,dcr:+d.dcr||0,fico:+d.fico||0,vsa:+d.vsa||0,spd:+d.spd||0,men:+d.men||0,whc:+d.whc||0,pod:+d.pod||0,cc:+d.cc||0,ce:+d.ce||0,cdf:+d.cdf||0,dnr:+d.dnr||0,lor:+d.lor||0};
  if(d.wb&&Array.isArray(d.wb))DB.wb[wk]=d.wb.slice(0,8);
  if(!SW.includes(wk))SW.push(wk);
  saveDB();renderWGrid();rManage();toast('Week '+wk+' imported');}
  catch(e){toast('Invalid JSON');}
}
function expData(){
  const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(DB,null,2));
  a.download='glel_dsy2_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Exported');
}
function toast(msg){
  const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),300);},2200);
}
init();
</script>
</body>
