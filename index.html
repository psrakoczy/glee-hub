function getDateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const date = now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  return { time, date };
}

function navigate(section, page, sub) {
  state.section = section;
  state.page    = page || getDefaultPage(section);
  state.sub     = sub || null;
  state.userOpen = false;
  render();
}

function getDefaultPage(sectionId) {
  const sec = NAV.find(n=>n.id===sectionId);
  return sec && sec.pages[0] ? sec.pages[0].id : 'overview';

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function div(style, ...children) { return el('div', {style}, ...children); }
function span(style, text) { return el('span', {style}, text); }
function txt(text) { return document.createTextNode(text); }

function makeTopbar() {
  const { time, date } = getDateTime();

  const logo = div({ padding:'0 24px', display:'flex', alignItems:'center', gap:'6px', borderRight:'1px solid rgba(255,255,255,0.05)', flexShrink:'0', fontFamily:'var(--fd)', fontSize:'18px', fontWeight:'900', letterSpacing:'0.1em', color:'var(--ti1)', height:'100%', cursor:'default' },
    span({}, 'GLEE'),
    span({ fontWeight:'300', opacity:'0.4', marginLeft:'2px' }, ' HUB')
  );

  const clock = el('div', { id:'topbar-clock', style:{ padding:'0 28px', display:'flex', alignItems:'center', gap:'20px', flex:'1' } });

  const dateEl = div({ fontSize:'12px', fontWeight:'400', color:'var(--ti3)', fontFamily:'var(--fb)', letterSpacing:'0.04em' }, date);
  const timeEl = el('div', { id:'live-time', style:{ fontFamily:'var(--fd)', fontSize:'20px', fontWeight:'700', letterSpacing:'0.1em', color:'var(--ti1)' } }, time);

  clock.appendChild(dateEl);
  clock.appendChild(timeEl);

  // User panel
  const userBtn = div({
    display:'flex', alignItems:'center', gap:'10px', padding:'0 20px', height:'100%',
    borderLeft:'1px solid rgba(255,255,255,0.05)', cursor:'pointer', userSelect:'none'
  },
    div({ width:'30px', height:'30px', borderRadius:'50%', background:'var(--shade)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--fd)', fontSize:'11px', fontWeight:'800', color:'var(--ti2)', flexShrink:'0' }, 'AU'),
    div({ display:'flex', flexDirection:'column', gap:'1px' },
      span({ fontFamily:'var(--fd)', fontSize:'12px', fontWeight:'700', letterSpacing:'0.06em', color:'var(--ti1)' }, 'Admin User'),
      span({ fontSize:'10px', color:'var(--ti3)' }, 'Super Admin')
    ),
    span({ fontSize:'10px', color:'var(--ti3)', marginLeft:'4px' }, '▾')
  );
  userBtn.addEventListener('click', () => {
    state.userOpen = !state.userOpen;
    render();
  });

  const wrapper = div({ display:'flex', alignItems:'stretch', height:'100%', marginLeft:'auto' });
  wrapper.appendChild(userBtn);

  const topbar = div(S.topbar);
  topbar.appendChild(logo);
  topbar.appendChild(clock);
  topbar.appendChild(wrapper);

  // Start clock ticking
  setInterval(() => {
    const t = document.getElementById('live-time');
    if (t) t.textContent = getDateTime().time;
  }, 1000);

  return topbar;
}

function makeSidebar() {
  const sidebar = div(S.sidebarW);

  // Section divider label
  function sectionLabel(text) {
    return div({ padding:'14px 18px 6px', fontSize:'8px', letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--ti3)', fontWeight:'700', fontFamily:'var(--fd)' }, text);
  }

  NAV.forEach((section, si) => {
    // Section header
    const isActive = state.section === section.id;

    const hoverStyle = isActive
      ? { background:'rgba(255,255,255,0.06)', borderLeft:'2px solid var(--ti1)' }
      : {};

    const secBtn = div({
      display:'flex', alignItems:'center', gap:'10px', padding:'10px 18px',
      cursor:'pointer', userSelect:'none', transition:'background 0.15s',
      borderLeft: isActive ? '2px solid var(--ti1)' : '2px solid transparent',
      background: isActive ? 'rgba(255,255,255,0.05)' : 'transparent',
      marginTop: si > 0 ? '2px' : '8px'
    },
      span({ fontSize:'13px', opacity: isActive ? '1' : '0.5', transition:'opacity 0.15s' }, getSectionIcon(section.id)),
      span({ fontFamily:'var(--fd)', fontSize:'12px', fontWeight:'800', letterSpacing:'0.1em', textTransform:'uppercase', color: isActive ? 'var(--ti1)' : 'var(--ti3)', transition:'color 0.15s' }, section.label)
    );
    secBtn.addEventListener('mouseenter', () => { if (!isActive) secBtn.style.background = 'rgba(255,255,255,0.03)'; });
    secBtn.addEventListener('mouseleave', () => { if (!isActive) secBtn.style.background = 'transparent'; });
    secBtn.addEventListener('click', () => navigate(section.id, section.pages[0].id, null));
    sidebar.appendChild(secBtn);

    // Sub-pages (only show if section is active)
    if (isActive && section.pages.length > 1) {
      section.pages.forEach(page => {
        const isPageActive = state.page === page.id && !state.sub;
        const hasChildren = page.sub && page.sub.length > 0;

        const pageBtn = div({
          display:'flex', alignItems:'center', gap:'6px', padding:'7px 18px 7px 38px',
          cursor:'pointer', userSelect:'none', background: isPageActive ? 'rgba(255,255,255,0.04)' : 'transparent',
          transition:'background 0.15s'
        },
          span({ fontSize:'9px', color:'var(--ti3)' }, '→'),
          span({ fontFamily:'var(--fd)', fontSize:'11px', fontWeight: isPageActive ? '700' : '600', letterSpacing:'0.08em', textTransform:'uppercase', color: isPageActive ? 'var(--ti1)' : 'var(--ti3)', transition:'color 0.15s' }, page.label),
          page.badge ? span({ marginLeft:'4px', padding:'1px 5px', fontSize:'7px', fontWeight:'700', letterSpacing:'0.08em', background:'rgba(255,255,255,0.06)', color:'var(--ti3)' }, page.badge) : null
        );
        pageBtn.addEventListener('mouseenter', () => { pageBtn.style.background = 'rgba(255,255,255,0.03)'; });
        pageBtn.addEventListener('mouseleave', () => { pageBtn.style.background = isPageActive ? 'rgba(255,255,255,0.04)' : 'transparent'; });
        pageBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (hasChildren) navigate(section.id, page.id, page.sub[0].id);
          else navigate(section.id, page.id, null);
        });
        sidebar.appendChild(pageBtn);

        // Third-level (sub-pages) if parent page is active
        if (hasChildren && state.page === page.id) {
          page.sub.forEach(subpage => {
            const isSubActive = state.sub === subpage.id;
            const subBtn = div({
              display:'flex', alignItems:'center', gap:'6px', padding:'6px 18px 6px 52px',
              cursor:'pointer', userSelect:'none', background: isSubActive ? 'rgba(255,255,255,0.04)' : 'transparent',
              transition:'background 0.15s'
            },
              span({ fontSize:'8px', color:'var(--ti3)', opacity:'0.5' }, '→'),
              span({ fontFamily:'var(--fd)', fontSize:'10px', fontWeight: isSubActive ? '700' : '500', letterSpacing:'0.08em', textTransform:'uppercase', color: isSubActive ? 'var(--ti1)' : 'var(--ti3)', transition:'color 0.15s' }, subpage.label)
            );
            subBtn.addEventListener('mouseenter', () => { subBtn.style.background = 'rgba(255,255,255,0.03)'; });
            subBtn.addEventListener('mouseleave', () => { subBtn.style.background = isSubActive ? 'rgba(255,255,255,0.04)' : 'transparent'; });
            subBtn.addEventListener('click', e => { e.stopPropagation(); navigate(section.id, page.id, subpage.id); });
            sidebar.appendChild(subBtn);
          });
        }
      });
    }

    // Divider after each section
    sidebar.appendChild(div({ height:'1px', background:'rgba(255,255,255,0.04)', margin:'6px 0' }));
  });

  return sidebar;
}

function getSectionIcon(id) {
  return { dashboard:'▣', email:'✉', quality:'◈', fleet:'⬡', employee:'◎', finance:'◇' }[id] || '○';
}

      div({ fontSize:'8px', letterSpacing:'0.18em', textTransform:'uppercase', color: t.hero ? 'rgba(0,0,0,0.35)' : 'var(--ti3)', marginBottom:'10px', fontFamily:'var(--fd)' }, t.label),

      ),

/* ── Page header ── */
function makePageHead(eyebrow, title, dimTitle, sub, actions) {
  return div({ padding:'28px 32px 0', display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexShrink:'0' },
    div({ },
      div({ fontSize:'9px', letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--t3)', marginBottom:'6px', fontFamily:'var(--fd)' }, eyebrow),
      div({ fontFamily:'var(--fd)', fontSize:'38px', fontWeight:'900', color:'var(--t1)', lineHeight:'1' },

    ),
    actions ? div({ display:'flex', gap:'8px', marginTop:'6px' }, ...actions) : null
  );
}

/* ── Button ── */
function makeBtn(label, solid, onClick) {
  const btn = div({
    display:'inline-flex', alignItems:'center', padding:'9px 18px',
    background: solid ? 'var(--black)' : 'transparent',
    color: solid ? 'var(--ti1)' : 'var(--t1)',
    border: solid ? 'none' : '1px solid var(--t1)',
    fontFamily:'var(--fd)', fontSize:'11px', fontWeight:'700',
    letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer',
    userSelect:'none', transition:'opacity 0.15s'
  }, label);
  btn.addEventListener('click', onClick || (()=>{}));
  btn.addEventListener('mouseenter', () => { btn.style.opacity = '0.8'; });
  btn.addEventListener('mouseleave', () => { btn.style.opacity = '1'; });
  return btn;
}

/* ── Panel wrapper ── */
function makePanel(children, dark) {
  const p = div(dark ? S.panelD : S.panel, ...children);
  return p;
}

function makePanelHead(title, actionLabel, onAction, dark) {
  return div({
    padding:'13px 18px', borderBottom: dark ? '1px solid rgba(255,255,255,0.06)' : '1px solid var(--bd)',

    actionLabel ? div({ fontSize:'9px', letterSpacing:'0.1em', textTransform:'uppercase', color: dark ? 'var(--ti3)' : 'var(--t2)', cursor:'pointer', fontWeight:'600' }, actionLabel) : null

function renderGenericPage(sectionId, pageId, subId) {
  const sec = NAV.find(n=>n.id===sectionId);

  const eyebrow = sec ? sec.label : sectionId;
  const title = page ? page.label : pageId;
  const subtitle = subpage ? subpage.label : null;

  // Get KPI tiles
  let tiles = null;
  try {
    const secKpi = KPI[sectionId];
    if (secKpi) {
      if (subId && secKpi[pageId] && secKpi[pageId][subId]) tiles = secKpi[pageId][subId];
      else if (secKpi[pageId] && Array.isArray(secKpi[pageId])) tiles = secKpi[pageId];

    div({ padding:'16px 18px', borderBottom:'1px solid rgba(255,255,255,0.06)' },
      div({ display:'flex', gap:'10px', alignItems:'center' },
        div({ width:'38px', height:'38px', borderRadius:'50%', background:'var(--shade)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--fd)', fontSize:'13px', fontWeight:'800', color:'var(--ti2)' }, 'AU'),
        div({},
          div({ fontSize:'13px', fontWeight:'600', color:'var(--ti1)' }, 'Admin User'),
          div({ fontSize:'10px', color:'var(--ti3)', marginTop:'1px' }, 'admin@gleelogistics.de')
        )
      ),
      div({ marginTop:'10px', padding:'5px 8px', background:'rgba(255,255,255,0.04)', display:'inline-block' },
        span({ fontSize:'9px', letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:'700', color:'var(--ti3)', fontFamily:'var(--fd)' }, 'Super Admin')
      )
    ),
    ...['Profile Settings','User Management','Notifications','Help & Support'].map(item =>
      div({ padding:'11px 18px', borderBottom:'1px solid rgba(255,255,255,0.04)', cursor:'pointer', fontSize:'12px', color:'var(--ti2)', display:'flex', alignItems:'center', justifyContent:'space-between' },
        item, span({ fontSize:'10px', color:'var(--ti3)' }, '→')
      )
    ),
    div({ padding:'11px 18px', cursor:'pointer', fontSize:'12px', color:'var(--ti3)', letterSpacing:'0.06em' }, 'Sign Out')
  );

  const wrapper = div({});
  wrapper.appendChild(overlay);
  wrapper.appendChild(panel);
  return wrapper;
}

/* ═══════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════ */
function getPageContent() {
  const { section, page, sub } = state;
  if (section==='dashboard') return renderDashboardOverview();
  if (section==='email')     return renderEmailPage(page);
  if (section==='fleet' && page==='overview') return renderFleetOverview();
  if (section==='fleet' && page==='fleetapp') return renderGenericPage('fleet','fleetapp',null);
  if (section==='employee' && page==='overview') return renderEmployeeOverview();
  return renderGenericPage(section, page, sub);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const shell = div({ height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden' });

  // Topbar
  shell.appendChild(makeTopbar());

  // Body
  const body = div({ flex:'1', display:'flex', overflow:'hidden' });
  body.appendChild(makeSidebar());

  // Content area
  const content = div({ flex:'1', overflowY:'auto', background:'var(--cream)', display:'flex', flexDirection:'column' });
  content.className = 'dark-scroll';
  content.appendChild(getPageContent());
  body.appendChild(content);

  shell.appendChild(body);
  app.appendChild(shell);

  // User panel overlay
  if (state.userOpen) app.appendChild(makeUserDropdown());
}

/* ─── Init ─── */
render();
</script>
