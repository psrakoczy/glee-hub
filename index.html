/* Try to load live data from Chrome extension storage */
function loadLiveRouteData(callback) {
  try {
    if (typeof chrome !== 'undefined' && chrome.storage) {
      chrome.storage.local.get(['gleeRouteData', 'gleeLastScrape'], (result) => {
        if (result && result.gleeRouteData && result.gleeRouteData.routes) {
          const d = result.gleeRouteData;
          const age = (Date.now() - new Date(d.scrapedAt).getTime()) / 1000 / 60; // minutes
          if (age < 10) { // only use data less than 10 minutes old
            callback(d, result.gleeLastScrape);
            return;
          }
        }
        callback(null, null);
      });
    } else {
      callback(null, null);
    }
  } catch(e) { callback(null, null); }
}
/* Auto-refresh live data every 30 seconds */

  loadLiveRouteData((data, lastScrape) => {
    if (data && APP.section === 'dashboard') render();
  });
}, 30000);

/* Get filtered NAV for current user role */
function getFilteredNav() {
  const role = APP.user && APP.user.role;
  const roleConfig = ROLES[role] || {};
  const allowed = roleConfig.nav || ['dashboard'];
  const isOps = role === 'ops';
  return NAV
    .filter(n => allowed.includes(n.id))
    .map(n => {
      // Ops: quality shows DSY2 only (Overview + Reporting), no other pages
      if(isOps && n.id === 'quality'){
        return {...n,pages:[{id:'dsy2',label:'DSY2 — Dashboard'}]};
      }
      return n;
    });
}

function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='cls')e.className=v;
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}

/* GOOGLE AUTH */
async function googleSignIn(){
  // If placeholder client ID, skip straight to demo
  if(GOOGLE_CLIENT_ID.includes('q5j6s0f2t4g0f6k0uq0j5q6j5q6j5q6j')){
    return Promise.reject(new Error('Demo mode'));
  }
  return new Promise((resolve,reject)=>{
    try{
      if(typeof google==='undefined'||!google.accounts){reject(new Error('GSI not loaded'));return;}
      const client=google.accounts.oauth2.initTokenClient({
        client_id:GOOGLE_CLIENT_ID,
        scope:'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
        callback:async(resp)=>{
          if(resp.access_token){
            try{
              const pr=await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{'Authorization':'Bearer '+resp.access_token}});
              const profile=await pr.json();
              resolve({token:resp.access_token,profile});
            }catch(e){reject(e);}
          }else{reject(new Error('No token'));}
        }
      });
      client.requestAccessToken();
    }catch(e){reject(e);}
  });
}

async function loadGmail(token){
  try{
    const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/threads?q=in:inbox&maxResults=20',{headers:{'Authorization':'Bearer '+token}});
    const data=await r.json();
    if(!data.threads)return getDemoEmails();
    const threads=await Promise.all(data.threads.map(async t=>{
      const tr=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/threads/'+t.id+'?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date',{headers:{'Authorization':'Bearer '+token}});
      const td=await tr.json();
      const msg=td.messages&&td.messages[0];
      const last=td.messages&&td.messages[td.messages.length-1];
      const hdrs=(msg&&msg.payload&&msg.payload.headers)||[];
      const get=n=>(hdrs.find(h=>h.name===n)||{value:''}).value;
      const unread=((last&&last.labelIds)||[]).includes('UNREAD');
      const labels=(last&&last.labelIds)||[];
      const subj=get('Subject')||'(no subject)';
      const fromRaw=get('From');
      const from=fromRaw.replace(/<[^>]*>/,'').trim()||fromRaw;
      const tag=labels.includes('CATEGORY_PROMOTIONS')?'Promo':
                labels.includes('CATEGORY_UPDATES')?'Update':
                /invoice|rechnung/i.test(subj)?'Invoice':
                labels.includes('IMPORTANT')?'Important':'';
      return{id:t.id,snippet:td.snippet||'',from,subject:subj,date:get('Date'),unread,labels,tag};
    }));
    return threads;
  }catch(e){console.warn('Gmail error:',e);return getDemoEmails();}
}

/* MSAL / OUTLOOK */
function initMSAL(){
  if(APP.cal.msal)return APP.cal.msal;
  try{const m=new msal.PublicClientApplication(MSAL_CONFIG);APP.cal.msal=m;return m;}
  catch(e){console.warn('MSAL init error:',e);return null;}
}

async function connectOutlook(){
  APP.cal.loading=true;render();
  try{
    const m=initMSAL();if(!m)throw new Error('MSAL not loaded');
    await m.initialize();
    const resp=await m.loginPopup({scopes:MSAL_SCOPES});
    APP.cal.account=resp.account;APP.cal.connected=true;
    await loadOutlookEvents();
  }catch(e){
    console.warn('Outlook failed, using demo events:',e.message);
    APP.cal.events=getDemoCalEvents();APP.cal.loading=false;render();
  }
}

async function loadOutlookEvents(){
  if(!APP.cal.msal||!APP.cal.account){APP.cal.events=getDemoCalEvents();APP.cal.loading=false;render();return;}
  try{
    const tr=await APP.cal.msal.acquireTokenSilent({scopes:MSAL_SCOPES,account:APP.cal.account});
    const tok=tr.accessToken;
    const start=new Date(APP.cal.date);
    start.setDate(start.getDate()-start.getDay()+1);start.setHours(0,0,0,0);
    const end=new Date(start);end.setDate(end.getDate()+7);
    const r=await fetch(
      'https://graph.microsoft.com/v1.0/me/calendarview?startDateTime='+start.toISOString()+'&endDateTime='+end.toISOString()+'&$orderby=start/dateTime&$top=50',
      {headers:{'Authorization':'Bearer '+tok,'Prefer':'outlook.timezone="Europe/Berlin"'}}
    );
    const data=await r.json();
    APP.cal.events=(data.value||[]).map(e=>({
      id:e.id,title:e.subject||'(no title)',
      start:new Date(e.start.dateTime+'Z'),end:new Date(e.end.dateTime+'Z'),
      location:(e.location&&e.location.displayName)||'',
      isAllDay:e.isAllDay||false,
      color:catColor(e.categories&&e.categories[0]),
      organizer:(e.organizer&&e.organizer.emailAddress&&e.organizer.emailAddress.name)||''
    }));
  }catch(e){console.warn('Calendar events error:',e);APP.cal.events=getDemoCalEvents();}
  APP.cal.loading=false;render();
}

function catColor(c){return({'Red':'#e74c3c','Blue':'#2980b9','Green':'#27ae60','Orange':'#e67e22','Purple':'#8e44ad','Cyan':'#16a085'})[c]||'#1A1A1A';}

function getDemoCalEvents(){
  const evts=[];const base=new Date();
  const tpl=[
    {t:'Team standup',d:30,c:'#1A1A1A',h:9},
    {t:'Route review DSY2',d:60,c:'#2980b9',h:10},
    {t:'Driver briefing',d:45,c:'#27ae60',h:7},
    {t:'Finance review',d:90,c:'#e67e22',h:14},
    {t:'HR 1:1',d:30,c:'#8e44ad',h:11},
    {t:'Amazon ops call',d:60,c:'#e74c3c',h:15},
    {t:'Fleet inspection',d:120,c:'#16a085',h:8},
    {t:'End of day report',d:30,c:'#1A1A1A',h:17},
  ];
  for(let di=0;di<7;di++){
    const day=new Date(base);
    day.setDate(base.getDate()-base.getDay()+1+di);
    const cnt=Math.floor(Math.random()*3)+1;
    for(let i=0;i<cnt;i++){
      const tm=tpl[(di*3+i)%tpl.length];
      const s=new Date(day);s.setHours(tm.h,0,0,0);
      const e=new Date(s);e.setMinutes(e.getMinutes()+tm.d);
      evts.push({id:'demo-'+di+'-'+i,title:tm.t,start:s,end:e,color:tm.c,isAllDay:false,location:'',organizer:(APP.user&&APP.user.name)||''});
    }
  }
  return evts;
}

function renderLogin(){
  const screen=el('div',{cls:'login-screen'});
  const card=el('div',{cls:'login-card'});

  /* Logo */
  card.appendChild(el('div',{cls:'login-logo'},'GLEE',el('span',{},' HUB')));
  card.appendChild(el('div',{cls:'login-sub'},'Operations Platform · DSY2 Lampertswalde'));

  /* Error message */
  const errMsg=d({fontSize:'11px',color:'#e74c3c',marginBottom:'14px',minHeight:'16px',textAlign:'center',fontFamily:'var(--fb)'}, '');
  card.appendChild(errMsg);

  /* Username */
  const ulabel=el('div',{cls:'login-label'},'Username');
  card.appendChild(ulabel);
  const uInput=el('input',{type:'text',placeholder:'Enter username',style:{
    width:'100%',padding:'11px 14px',background:'rgba(255,255,255,.06)',
    border:'1px solid rgba(255,255,255,.1)',color:'var(--ti1)',
    fontFamily:'var(--fb)',fontSize:'13px',outline:'none',
    marginBottom:'14px',display:'block',letterSpacing:'.02em'
  }});
  card.appendChild(uInput);

  /* Password */
  const plabel=el('div',{cls:'login-label'},'Password');
  card.appendChild(plabel);
  const pInput=el('input',{type:'password',placeholder:'Enter password',style:{
    width:'100%',padding:'11px 14px',background:'rgba(255,255,255,.06)',
    border:'1px solid rgba(255,255,255,.1)',color:'var(--ti1)',
    fontFamily:'var(--fb)',fontSize:'13px',outline:'none',
    marginBottom:'24px',display:'block',letterSpacing:'.04em'
  }});
  card.appendChild(pInput);

  /* Login button */
  const loginBtn=d({
    width:'100%',padding:'14px',background:'var(--ti1)',color:'var(--black)',
    border:'none',cursor:'pointer',fontFamily:'var(--fd)',fontSize:'13px',
    fontWeight:'900',letterSpacing:'.1em',textTransform:'uppercase',
    textAlign:'center',transition:'opacity .15s',userSelect:'none',
    marginBottom:'16px'
  },'Sign In');

  function doLogin(){
    const u=uInput.value.trim().toLowerCase();
    const p=pInput.value;
    const account=ACCOUNTS.find(a=>a.username===u&&a.password===p);
    if(!account){
      errMsg.textContent='Incorrect username or password.';
      pInput.style.borderColor='#e74c3c';
      uInput.style.borderColor='#e74c3c';
      return;
    }
    APP.user={
      name:account.name,
      title:account.title,
      email:account.email,
      initials:account.initials,
      role:account.role,
      googleToken:null
    };
    // Set correct starting page per role
    if(account.role==='ops'){
      APP.section='quality';APP.page='dsy2';APP.sub='overview';
    } else {
      APP.section='dashboard';APP.page='overview';APP.sub=null;
    }
    APP.gmail.threads=getDemoEmails();
    // Save session with 4-hour expiry
    const session={user:APP.user,expires:Date.now()+(4*60*60*1000)};
    sessionStorage.setItem('gleeSession',JSON.stringify(session));
    render();
  }

  loginBtn.addEventListener('click',doLogin);
  loginBtn.addEventListener('mouseenter',()=>{loginBtn.style.opacity='.85';});
  loginBtn.addEventListener('mouseleave',()=>{loginBtn.style.opacity='1';});

  /* Enter key support */
  [uInput,pInput].forEach(inp=>{
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    inp.addEventListener('focus',()=>{
      inp.style.borderColor='rgba(255,255,255,.3)';
      errMsg.textContent='';
    });
  });

  card.appendChild(loginBtn);
  card.appendChild(el('div',{cls:'login-note'},'GLEE Logistics GmbH · Internal use only'));
  screen.appendChild(card);
  return screen;
}

/* DASHBOARD */
function renderDashboard(){
  const total=ROUTES.reduce((s,r)=>s+r.dt,0);
  const done=ROUTES.reduce((s,r)=>s+r.dc,0);
  const pct=Math.round(done/total*100);
  const portalUrl='https://logistics.amazon.de/operations/execution/dv/routes?navMenuVariant=external&provider=ALL_DRIVERS&serviceAreaId=79b18918-ed92-47f1-af33-59c03edab660';
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const w=d({flex:'1',display:'flex',flexDirection:'column'});w.className='fade';
  w.appendChild(d({padding:'22px 28px 0',flexShrink:'0'},
    d({fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--t3)',marginBottom:'5px',fontFamily:'var(--fd)'},'Welcome, '+((APP.user&&APP.user.name&&APP.user.name.split(' ')[0])||'there')+' \xb7 '+today),
    d({fontFamily:'var(--fd)',fontSize:'32px',fontWeight:'900',color:'var(--t1)',lineHeight:'1'},'Operations ',sp({fontWeight:'300',color:'var(--t3)'},'Overview'))
  ));
  const body=d({padding:'16px 28px 28px',flex:'1',overflowY:'auto',display:'flex',flexDirection:'column',gap:'14px'});

  /* Route Summary — tries live data from extension first */
  const rs=document.createElement('div');rs.className='fade1';
  const rp=d({background:'#fff',border:'1px solid var(--bd)',overflow:'hidden'});

  // Build route summary section (updates when live data arrives)
  function buildRouteSummary(container, liveData, lastScrape) {
    container.innerHTML='';
    const routeTotal  = liveData ? liveData.routes.total : ROUTES.length;
    const routeParcels = liveData ? liveData.routes.totalParcels : total;
    const routeDone   = liveData ? liveData.routes.deliveredParcels : done;
    const routePct    = liveData ? liveData.routes.parcelPct : pct;
    const routeBehind = liveData ? liveData.routes.behind : ROUTES.filter(r=>r.bh>0).length;
    const routeAhead  = liveData ? liveData.routes.ahead : ROUTES.filter(r=>r.bh===0).length;
    const isLive = !!liveData;
    const scrapeTime = lastScrape ? new Date(lastScrape).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : null;

    const headAction = isLive ? ('\u2713 Live \xb7 Updated '+scrapeTime) : '\u26a0 Demo Data \xb7 Install Extension';
    const headColor = isLive ? 'var(--green)' : 'var(--amber)';
    const ph = panelHead('DSY2 \u2014 Route Summary', headAction, null);
    if(ph.lastChild) ph.lastChild.style.color = headColor;
    container.appendChild(ph);

    const tg=d({display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr'});
    const parcelSub = isLive && liveData.routes.remaining
      ? liveData.routes.remaining.toLocaleString()+' remaining'
      : (routeDone.toLocaleString()+' of '+(routeParcels||'?').toLocaleString());
    [
      [String(routeTotal),'Routes Today',(isLive?'In progress: '+liveData.routes.inProgress:'Active routes \xb7 DSY2'),'dark'],
      [routePct+'%','Parcel Progress',parcelSub,'hero'],
      [(isLive?liveData.routes.behind:ROUTES.filter(r=>r.bh>0).length)+' behind / '+(isLive?liveData.routes.ahead:ROUTES.filter(r=>r.bh===0).length)+' ahead','Route Status',(isLive?liveData.routes.atRisk+' at risk':'Route performance'),'dark'],
      ['\u2197 Open','Amazon Portal','logistics.amazon.de','link']
    ].forEach(([val,lbl,sub,typ],i)=>{
    const tile=d({background:typ==='hero'?'var(--ti1)':'var(--black)',padding:'20px 22px 16px',borderRight:i<3?'1px solid rgba('+(typ==='hero'?'0,0,0':'255,255,255')+',.04)':'none',cursor:typ==='link'?'pointer':'default',display:'flex',flexDirection:'column',justifyContent:'space-between'});
    tile.appendChild(d({fontSize:'8px',letterSpacing:'.18em',textTransform:'uppercase',color:typ==='hero'?'rgba(0,0,0,.35)':'var(--ti3)',marginBottom:'8px',fontFamily:'var(--fd)'},lbl));
    tile.appendChild(d({fontFamily:'var(--fd)',fontSize:typ==='link'?'20px':'44px',fontWeight:'900',color:typ==='hero'?'var(--black)':'var(--ti1)',lineHeight:'1'},val));
    tile.appendChild(d({fontSize:'10px',color:typ==='hero'?'rgba(0,0,0,.35)':'var(--ti3)',marginTop:'6px'},sub));
    if(typ==='link')tile.addEventListener('click',()=>window.open(portalUrl,'_blank'));
    tg.appendChild(tile);
  });
    container.appendChild(tg);
  }

  buildRouteSummary(rp, null, null);
  // Try to load live data and update
  loadLiveRouteData((liveData, lastScrape) => {
    buildRouteSummary(rp, liveData, lastScrape);
  });
  rs.appendChild(rp);body.appendChild(rs);

  /* Schedule */
  const ss=document.createElement('div');ss.className='fade1';
  const schp=d({background:'#fff',border:'1px solid var(--bd)',overflow:'hidden'});
  schp.appendChild(panelHead("Today\u2019s Schedule",'Open Calendar \u2192',()=>nav('dashboard','calendar',null)));

      d({},d({fontSize:'12px',fontWeight:'600',color:isDark?'var(--ti1)':'var(--t1)',marginBottom:'2px'},item.title),d({fontSize:'10px',color:isDark?'var(--ti3)':'var(--t3)'},item.detail)),
      isAlert?sp({padding:'2px 7px',fontSize:'8px',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:'700',background:'var(--t1)',color:'var(--ti1)',marginLeft:'12px',flexShrink:'0'},'Action'):null
    ));
    schp.appendChild(row);
  });
  ss.appendChild(schp);body.appendChild(ss);

  /* Fleet */
  const f=FLEET;

    row.addEventListener('mouseenter',()=>{row.style.background='var(--cream2)';});

    row.addEventListener('click',()=>nav('email','overview',null));
    row.appendChild(d({width:'6px',height:'6px',borderRadius:'50%',background:em.unread?'var(--t1)':'transparent',flexShrink:'0',marginTop:'3px'}));
    row.appendChild(d({flex:'1',minWidth:'0'},

        sp({fontSize:'10px',color:'var(--t3)',flexShrink:'0',marginLeft:'8px'},em.date||em.time||'')

      sp({fontSize:'11px',color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'},em.subject)

function buildWeekView(c){

  days.forEach((day,di)=>{

    for(let h=0;h<24;h++)col.appendChild(d({height:'48px',borderBottom:'1px solid var(--bd)'}));
    APP.cal.events.filter(ev=>!ev.isAllDay&&ev.start.toDateString()===day.toDateString()).forEach(ev=>{
      const sh=ev.start.getHours()+ev.start.getMinutes()/60;

      const dur=Math.max(eh-sh,.25);
      const evEl=d({position:'absolute',left:'3px',right:'3px',top:(sh*48)+'px',height:(dur*48-2)+'px',background:ev.color,padding:'3px 6px',cursor:'pointer',overflow:'hidden',borderRadius:'1px',zIndex:'2'});
      evEl.appendChild(d({fontWeight:'600',color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'10px'},ev.title));
      if(dur>0.5)evEl.appendChild(d({fontSize:'9px',color:'rgba(255,255,255,.7)',marginTop:'1px'},String(ev.start.getHours()).padStart(2,'0')+':'+String(ev.start.getMinutes()).padStart(2,'0')));
      evEl.addEventListener('click',()=>{APP.modal={type:'event',data:ev};render();});
      evEl.addEventListener('mouseenter',()=>{evEl.style.opacity='.8';});

    d({flex:'1'},d({fontFamily:'var(--fd)',fontSize:'14px',fontWeight:'800',letterSpacing:'.08em',color:'var(--ti1)',marginBottom:'4px'},'Integration Pending \u2014 '+title),d({fontSize:'12px',color:'var(--ti3)'},'Connect your '+(s?s.label:sec)+' data source to activate live data.')),
    mkbtn('Configure \u2192',true)
  ));
  w.appendChild(inner);return w;
}

/* MODALS */
function renderModals(){
  if(!APP.modal)return null;
  const ov=d({position:'fixed',inset:'0',background:'rgba(0,0,0,.6)',zIndex:'500',display:'flex',alignItems:'center',justifyContent:'center'});
  ov.addEventListener('click',e=>{if(e.target===ov){APP.modal=null;render();}});
  if(APP.modal.type==='event'){
    const ev=APP.modal.data;
    const m=d({width:'440px',background:'#fff',border:'1px solid var(--bd)',boxShadow:'0 20px 60px rgba(0,0,0,.2)'});
    const head=d({padding:'18px 20px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'flex-start',justifyContent:'space-between'});
    head.appendChild(d({},
      d({fontFamily:'var(--fd)',fontSize:'18px',fontWeight:'900',letterSpacing:'.04em'},ev.title),
      d({fontSize:'11px',color:'var(--t3)',marginTop:'4px'},ev.start.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+' \xb7 '+String(ev.start.getHours()).padStart(2,'0')+':'+String(ev.start.getMinutes()).padStart(2,'0')+' \u2013 '+String(ev.end.getHours()).padStart(2,'0')+':'+String(ev.end.getMinutes()).padStart(2,'0')),
      ev.location?d({fontSize:'11px',color:'var(--t3)',marginTop:'2px'},'Location: '+ev.location):null,
      ev.organizer?d({fontSize:'11px',color:'var(--t3)',marginTop:'2px'},'Organiser: '+ev.organizer):null
    ));
    const xb=d({width:'28px',height:'28px',border:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'16px',color:'var(--t2)',flexShrink:'0'},'\xd7');
    xb.addEventListener('click',()=>{APP.modal=null;render();});
    head.appendChild(xb);m.appendChild(head);
    m.appendChild(d({padding:'14px 20px'},d({display:'flex',gap:'8px',alignItems:'center'},d({width:'10px',height:'10px',borderRadius:'50%',background:ev.color,flexShrink:'0'}),sp({fontSize:'12px',color:'var(--t2)'},(APP.cal.connected?'Outlook Calendar':'Demo Calendar')+' \xb7 '+((APP.user&&APP.user.email)||'')))));
    ov.appendChild(m);
  }
  if(APP.modal.type==='new-event'){
    const m=d({width:'460px',background:'#fff',border:'1px solid var(--bd)',boxShadow:'0 20px 60px rgba(0,0,0,.2)'});
    const head=d({padding:'18px 20px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between'});
    head.appendChild(sp({fontFamily:'var(--fd)',fontSize:'16px',fontWeight:'900',letterSpacing:'.06em'},'New Event'));
    const xb=d({width:'28px',height:'28px',border:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'16px',color:'var(--t2)'},'\xd7');
    xb.addEventListener('click',()=>{APP.modal=null;render();});
    head.appendChild(xb);m.appendChild(head);
    const form=d({padding:'20px'});
    const inp={};
    [['title','Event Title','text'],['date','Date','date'],['startTime','Start Time','time'],['endTime','End Time','time'],['location','Location (optional)','text']].forEach(([name,label,type])=>{
      const row=d({marginBottom:'14px'});
      row.appendChild(el('label',{style:{fontSize:'9px',letterSpacing:'.16em',textTransform:'uppercase',fontWeight:'700',color:'var(--t3)',fontFamily:'var(--fd)',marginBottom:'5px',display:'block'}},label));
      const i3=el('input',{type,placeholder:label,style:{width:'100%',padding:'9px 12px',border:'1px solid var(--bd)',background:'var(--cream)',fontFamily:'var(--fb)',fontSize:'12px',color:'var(--t1)',outline:'none'}});
      inp[name]=i3;row.appendChild(i3);form.appendChild(row);
    });
    inp.date.value=new Date().toISOString().slice(0,10);inp.startTime.value='09:00';inp.endTime.value='10:00';
    form.appendChild(d({display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'16px',paddingTop:'14px',borderTop:'1px solid var(--bd)'},
      mkbtn('Cancel',false,()=>{APP.modal=null;render();}),
      mkbtn('Save Event',true,()=>{
        const s3=new Date(inp.date.value+'T'+inp.startTime.value);
        const e3=new Date(inp.date.value+'T'+inp.endTime.value);
        APP.cal.events.push({id:'local-'+Date.now(),title:inp.title.value||'New Event',start:s3,end:e3,location:inp.location.value||'',color:'#1A1A1A',isAllDay:false,organizer:(APP.user&&APP.user.name)||''});
        APP.modal=null;render();
      })
    ));
    m.appendChild(form);ov.appendChild(m);
  }
  return ov;
}

/* USER MENU */
function renderUserMenu(){
  const ov=d({position:'fixed',inset:'0',zIndex:'100'});
  ov.addEventListener('click',()=>{APP.userMenuOpen=false;render();});
  const p=d({position:'fixed',top:'52px',right:'0',width:'280px',background:'var(--near)',border:'1px solid rgba(255,255,255,.06)',zIndex:'101',boxShadow:'0 8px 32px rgba(0,0,0,.5)'});
  p.appendChild(d({padding:'16px 18px',borderBottom:'1px solid rgba(255,255,255,.06)'},
    d({display:'flex',gap:'10px',alignItems:'center'},
      APP.user&&APP.user.avatar?el('img',{src:APP.user.avatar,style:{width:'40px',height:'40px',borderRadius:'50%',objectFit:'cover'}}):d({width:'40px',height:'40px',borderRadius:'50%',background:'var(--shade)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fd)',fontSize:'14px',fontWeight:'800',color:'var(--ti2)'},(APP.user&&APP.user.initials)||'?'),
      d({},
        sp({fontSize:'13px',fontWeight:'600',color:'var(--ti1)'},(APP.user&&APP.user.name)||''),
        d({fontSize:'10px',color:'var(--ti3)',marginTop:'2px'},(APP.user&&APP.user.email)||''),
        d({fontSize:'9px',color:'var(--ti3)',marginTop:'3px',fontFamily:'var(--fd)',letterSpacing:'.08em',textTransform:'uppercase'},(ROLES[APP.user&&APP.user.role]&&ROLES[APP.user.role].label)||'')
      )
    )
  ));
  p.appendChild(d({padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',justifyContent:'space-between'},
    d({},sp({fontSize:'11px',color:'var(--ti2)'},'Outlook Calendar'),d({fontSize:'10px',color:APP.cal.connected?'var(--green)':'var(--ti3)',marginTop:'2px'},APP.cal.connected?'\u2713 Connected':'Not connected')),
    APP.cal.connected?null:mkbtn('Connect',true,async()=>{APP.userMenuOpen=false;await connectOutlook();},{padding:'5px 10px',fontSize:'9px'})
  ));
  p.appendChild(d({padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,.06)'},
    sp({fontSize:'11px',color:'var(--ti2)'},'Gmail'),
    d({fontSize:'10px',color:APP.gmail.token?'var(--green)':'var(--ti3)',marginTop:'2px'},APP.gmail.token?'\u2713 '+(APP.user&&APP.user.email):'Connected as demo')
  ));
  const so=d({padding:'12px 18px',cursor:'pointer',fontSize:'12px',color:'var(--ti3)'},'\u238b Sign Out');
  so.addEventListener('click',()=>{APP.user=null;APP.gmail={loading:false,threads:[],selected:null,filter:'all',token:null};APP.cal.connected=false;APP.cal.events=[];APP.userMenuOpen=false;render();});
  p.appendChild(so);
  const wr=d({});wr.appendChild(ov);wr.appendChild(p);return wr;
}

/* MAIN RENDER */
function renderQualityDSY2(){
  const w=d({flex:'1',display:'flex',flexDirection:'column',overflow:'hidden'});
  w.className='fade';
  const frame=el('iframe',{src:'quality.html',style:{flex:'1',width:'100%',border:'none',display:'block'}});
  w.appendChild(frame);
  return w;
}

function getContent(){
  const{section,page,sub}=APP;
  if(section==='dashboard'&&page==='overview')return renderDashboard();
  if(section==='dashboard'&&page==='calendar')return renderCalendar();
  if(section==='email')return renderEmailPage();
  if(section==='fleet'&&page==='dsy2')return renderDSY2();
  if(section==='quality')return renderQualityDSY2(sub);
  return renderGeneric(section,page,sub);
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  // Restore session if not logged in
  if(!APP.user){
    try{
      const s=JSON.parse(sessionStorage.getItem('gleeSession')||'null');
      if(s&&s.user&&s.expires>Date.now()){
        APP.user=s.user;
        APP.gmail.threads=getDemoEmails();
        if(APP.user.role==='ops'){APP.section='quality';APP.page='dsy2';APP.sub='overview';}
      }
    }catch(e){}
  }
  if(!APP.user){app.appendChild(renderLogin());return;}
  // Ops managers only see quality — redirect if anywhere else
  if(APP.user&&APP.user.role==='ops'&&APP.section!=='quality'){
    APP.section='quality';APP.page='dsy2';APP.sub=APP.sub||'overview';
  }
  const shell=d({height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'});
  shell.appendChild(makeTopbar());
  const body=d({flex:'1',display:'flex',overflow:'hidden'});
  body.appendChild(makeSidebar());
  const content=d({flex:'1',overflowY:'auto',background:'var(--cream)',display:'flex',flexDirection:'column'});
  content.appendChild(getContent());
  body.appendChild(content);shell.appendChild(body);app.appendChild(shell);
  if(APP.userMenuOpen)app.appendChild(renderUserMenu());
  const modal=renderModals();if(modal)app.appendChild(modal);
}

render();

</script>
</body>
</html>
